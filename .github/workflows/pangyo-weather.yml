name: 판교 날씨 카카오톡 전송

on:
  schedule:
    # 매일 아침 5:40 (KST) = UTC 20:40 (전날) — GitHub Actions 지연 감안
    - cron: '40 20 * * *'
  workflow_dispatch: # 수동 실행 지원

jobs:
  send-weather:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 의존성 설치
        run: pip install -r requirements.txt

      - name: 🌤️ 날씨 조회 및 카카오톡 전송
        id: weather
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TZ: Asia/Seoul
        run: python pangyo_weather_kakao.py

      - name: 🔐 갱신된 토큰을 GitHub Secrets에 저장
        if: steps.weather.outputs.new_access_token != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🔄 access_token Secrets 업데이트..."
          echo -n "${{ steps.weather.outputs.new_access_token }}" | gh secret set KAKAO_ACCESS_TOKEN
          if [ -n "${{ steps.weather.outputs.new_refresh_token }}" ]; then
            echo "🔄 refresh_token Secrets 업데이트..."
            echo -n "${{ steps.weather.outputs.new_refresh_token }}" | gh secret set KAKAO_REFRESH_TOKEN
          fi
          echo "✅ Secrets 업데이트 완료"
